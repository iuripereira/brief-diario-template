name: brief-diario

# Orquestração serverless do brief diário (lock, retry, validação, alerta).
# Agendamento: Cloudflare Worker externo (scheduler/). Setup: ver SETUP.md.

on:
  # Disparo: agendador externo (Cloudflare Worker em scheduler/) via API, porque o
  # evento `schedule` nativo do Actions atrasa horas em repos de baixa atividade. O
  # horário (no seu timezone) vive no Worker, que roda em DOIS ticks/dia e re-dispara
  # se o 1º não entregou (recuperação) — ver scheduler/README.md. Não há fallback
  # `schedule` aqui: ele entregava tarde demais e o antigo job `guard` quebrava sem
  # checkout git. Também serve para execução manual pelo botão "Run workflow".
  workflow_dispatch: {}

concurrency:                   # equivale ao flock: nunca dois runs simultâneos
  group: brief-diario
  cancel-in-progress: false

# Least-privilege do GITHUB_TOKEN: o workflow só LÊ o repo no checkout. Nenhum passo
# escreve (a entrega é por SMTP/chat, não por commit). A verificação de dedup vive no
# Worker (PAT próprio), não aqui — por isso não precisamos mais de `actions: read`.
permissions:
  contents: read

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # --- constantes (não-segredo) — AJUSTE ao seu caso ---
      BRIEF_TZ: UTC                              # use o mesmo timezone do seu config.yaml (perfil.timezone)
      MAIL_METHOD: smtp
      SMTP_URL: smtps://smtp.gmail.com:465        # ajuste ao seu provedor SMTP (ver CONNECTORS.md)
      CLAUDE_MODEL: sonnet
      CLAUDE_FALLBACK_MODEL: claude-haiku-4-5
      CLAUDE_MAX_TURNS: '50'
      CLAUDE_EXTRA_ARGS: --strict-mcp-config
      # --- segredos ---
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      EMAIL_TO:   ${{ secrets.EMAIL_TO }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      SMTP_USER:  ${{ secrets.SMTP_USER }}
      SMTP_PASS:  ${{ secrets.SMTP_PASS }}
      TODOIST_API_TOKEN: ${{ secrets.TODOIST_API_TOKEN }}
      # entrega em chat — preencha o que usar (ver entrega.chat.tipo no config.yaml)
      SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      # Actions pinadas por SHA (supply chain): o SHA é imutável, a tag flutua.
      # Comentário registra a versão legível; ao atualizar, troque SHA + comentário.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '20'

      - name: Instalar dependências (Claude Code CLI + PyYAML)
        run: |
          npm i -g @anthropic-ai/claude-code
          python3 -m pip install --quiet pyyaml

      - name: Restaurar config + credenciais dos MCPs (a partir de secrets)
        env:
          CONFIG_YAML:       ${{ secrets.CONFIG_YAML }}
          GMAIL_MCP_DIR_B64: ${{ secrets.GMAIL_MCP_DIR_B64 }}
          GCAL_MCP_DIR_B64:  ${{ secrets.GCAL_MCP_DIR_B64 }}
        run: |
          set -euo pipefail
          # config.yaml do runner: vem do secret CONFIG_YAML (não versionado)
          printf '%s' "$CONFIG_YAML" > config.yaml
          # diretórios de token capturados numa autorização local única (ver SETUP.md)
          [[ -n "${GMAIL_MCP_DIR_B64:-}" ]] && printf '%s' "$GMAIL_MCP_DIR_B64" | base64 -d | tar xzf - -C "$HOME" || true
          [[ -n "${GCAL_MCP_DIR_B64:-}" ]]  && printf '%s' "$GCAL_MCP_DIR_B64"  | base64 -d | tar xzf - -C "$HOME" || true
          # mcp-servers.json do runner: injeta o token Todoist e o $HOME no caminho do gcal
          sed -e "s#COLOQUE_SEU_TOKEN_TODOIST#${TODOIST_API_TOKEN}#g" \
              -e "s#/home/SEU-USUARIO#${HOME}#g" \
              mcp-servers.example.json > mcp-servers.json

      - name: Gerar (1 retry) + validar
        run: |
          set -euo pipefail
          export TZ="$BRIEF_TZ"
          TODAY=$(date +%F)
          echo "TODAY=$TODAY" >> "$GITHUB_ENV"
          # Contrato de artefatos: fonte canônica única em scripts/lib/brief_contract.py
          # (mesmo validador usado pelo hook Stop). `files` dá os caminhos p/ limpar antes
          # de cada tentativa; `validate` aplica as regras.
          mapfile -t ARTIFACTS < <(python3 scripts/lib/brief_contract.py files "$TODAY")
          ok=0
          for attempt in 1 2; do
            echo "--- geração: tentativa $attempt"
            rm -f "${ARTIFACTS[@]}"   # nunca validar artefato velho/parcial
            if scripts/generate.sh "$TODAY" && python3 scripts/lib/brief_contract.py validate "$TODAY"; then ok=1; break; fi
            echo "tentativa $attempt falhou"
          done
          [[ $ok -eq 1 ]]

      - name: Entregar (e-mail + chat)
        run: |
          set -euo pipefail
          fail=""
          scripts/send-email.sh "$TODAY" || fail+=" email"
          scripts/send-chat.sh "$TODAY" || fail+=" chat"
          [[ -z "$fail" ]] || { echo "entrega parcial:$fail"; exit 1; }

      - name: Alerta em caso de falha (e-mail + chat)
        if: failure()
        run: |
          # Dois canais independentes (belt-and-suspenders): se o SMTP estiver fora,
          # o chat ainda avisa, e vice-versa. Ambos não-fatais (|| true) — o run já
          # está marcado como falho; o alerta é best-effort.
          MSG="🚨 Brief de ${TODAY:-hoje} FALHOU no GitHub Actions. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          scripts/send-email.sh --alert "$MSG" || true
          scripts/send-chat.sh  --alert "$MSG" || true

      - name: Guardar artefatos (debug/retenção)
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: brief-${{ env.TODAY }}
          path: |
            briefs/*.md
            briefs/*.html
            logs/claude-*.json
          # 7 dias: janela curta de debug sem reter dados pessoais do brief por 1 mês.
          # (logs/claude-*.json é só metadados do run — termina em BRIEF_OK, sem PII.)
          retention-days: 7
          if-no-files-found: ignore
